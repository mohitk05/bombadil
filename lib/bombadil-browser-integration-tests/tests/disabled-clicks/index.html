<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disabled Clicks</title>
</head>
<body>
    <h1>Disabled Clicks Test</h1>

    <button id="disabled-button" disabled>disabled button</button>
    <input id="disabled-input" type="text" disabled value="x" />
    <textarea id="disabled-textarea" disabled>x</textarea>

    <fieldset disabled>
        <legend>group</legend>
        <button id="fieldset-child-button">in disabled fieldset</button>
    </fieldset>

    <label id="label-for-disabled" for="disabled-input">label for disabled input</label>
</body>
</html>
