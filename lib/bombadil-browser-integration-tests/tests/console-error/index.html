<!DOCTYPE html>
<html>
  <head>
    <title>Console Error</title>
    <style>
      button {
        display: block;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <button id="a">A</button>

    <script>
      const button = document.querySelector("button");
      let count = 0;
      button.addEventListener("click", event => {
        count++;
        if (count >= 3) {
          console.error("oh no you pressed too much");
        }
      });
    </script>
  </body>
</html>
