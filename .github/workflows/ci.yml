name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  id-token: write
  contents: write
  pages: write
  actions: write

jobs:
  check-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml version
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)"
            exit 1
          fi
          echo "Version $cargo_version confirmed"
      - name: Extract changelog
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk "/^## ${version//./\\.}/{found=1; next} /^## /{found=0} found" CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "::error::No changelog entry found for version $version"
            exit 1
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux
            package: aarch64-linux
          - os: macos-latest
            target: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          scope: build-${{ matrix.target }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake check .
      - name: Build package
        run: nix build .#${{ matrix.package || 'default' }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bombadil-${{ matrix.target }}
          path: result/bin/bombadil
      - name: Build Docker image
        if: matrix.target == 'x86_64-linux'
        run: nix build ".#docker"

  build-npm-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          scope: npm-package
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build npm package
        run: nix build .#npm-package
      - name: Copy package
        run: |
          mkdir -p npm-pkg-dist
          cp -r result/* npm-pkg-dist/
      - name: Create package tarball
        run: tar -czf bombadil-npm-package.tar.gz -C npm-pkg-dist .
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombadil-npm-package
          path: bombadil-npm-package.tar.gz

  build-manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
        with:
          scope: manual
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build manual
        run: nix build .#manual
      - name: Create manual archive
        run: tar -czf bombadil-manual.tar.gz -C result .
      - name: Upload manual artifact
        uses: actions/upload-artifact@v4
        with:
          name: bombadil-manual
          path: bombadil-manual.tar.gz
      - name: Upload manual for GitHub Pages
        uses: actions/upload-artifact@v4
        with:
          name: manual-pages
          path: result/

  inspect-test:
    name: Inspect UI test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable
      - run: echo "CHROME=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
      - uses: actions/download-artifact@v4
        with:
          name: bombadil-x86_64-linux
      - name: Generate report
        run: |
          chmod +x bombadil
          ./bombadil browser test lib/integration-tests/tests/console-error/index.html \
            --headless --no-sandbox \
            --output-path report \
            --exit-on-violation \
            --time-limit 30s || true
      - name: Test inspect UI
        run: |
          ./bombadil browser inspect report --no-open --port 1073 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1073 > /dev/null 2>&1; then break; fi
            sleep 1
          done
          export RUST_LOG=debug
          ./bombadil browser test \
            --headless --no-sandbox \
            --instrument-javascript="" \
            --output-path inspect-test-output \
            --time-limit 1m \
            http://localhost:1073 \
            lib/bombadil-inspect/test/inspect.spec.ts
      - name: Upload inspect test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: inspect-test-output
          path: inspect-test-output/

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bombadil-x86_64-linux
          - os: macos-latest
            artifact: bombadil-aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
      - name: Test binary runs without Nix
        run: |
          chmod +x bombadil
          ./bombadil --version
      - name: Test terminal subcommand
        run: ./bombadil terminal test --specification lib/bombadil-terminal/examples/cat.ts head -n 100

  test-npm-package:
    name: Test npm package (${{ matrix.os }})
    needs: [build, build-npm-package]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bombadil-x86_64-linux
            binary: bombadil-linux-x64
          - os: macos-latest
            artifact: bombadil-aarch64-darwin
            binary: bombadil-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bombadil-npm-package
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Test npm package end to end
        run: |
          mkdir -p pkg
          tar -xzf bombadil-npm-package.tar.gz -C pkg
          mkdir -p pkg/binaries
          cp bombadil pkg/binaries/${{ matrix.binary }}
          chmod +x pkg/binaries/${{ matrix.binary }}
          mkdir test-install
          cd test-install
          npm install ../pkg
          npx bombadil --version

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      [
        check-version,
        build,
        build-npm-package,
        build-manual,
        smoke-test,
        test-npm-package,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release binaries
        run: |
          for target in x86_64-linux aarch64-linux aarch64-darwin; do
            chmod +x artifacts/bombadil-$target/bombadil
            mv artifacts/bombadil-$target/bombadil artifacts/bombadil-$target/bombadil-$target
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ needs.check-version.outputs.changelog }}
          files: |
            artifacts/bombadil-x86_64-linux/bombadil-x86_64-linux
            artifacts/bombadil-aarch64-linux/bombadil-aarch64-linux
            artifacts/bombadil-aarch64-darwin/bombadil-aarch64-darwin
            artifacts/bombadil-npm-package/bombadil-npm-package.tar.gz
            artifacts/bombadil-manual/bombadil-manual.tar.gz

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check-version, build, build-npm-package, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Extract npm package
        run: |
          mkdir -p pkg
          tar -xzf artifacts/bombadil-npm-package/bombadil-npm-package.tar.gz -C pkg
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Bundle binaries
        run: |
          mkdir -p pkg/binaries
          cp artifacts/bombadil-x86_64-linux/bombadil  pkg/binaries/bombadil-linux-x64
          cp artifacts/bombadil-aarch64-linux/bombadil  pkg/binaries/bombadil-linux-arm64
          cp artifacts/bombadil-aarch64-darwin/bombadil pkg/binaries/bombadil-darwin-arm64
          chmod +x pkg/binaries/*
      - name: Publish to npm
        run: |
          cd pkg
          npm publish --provenance --access public

  publish-manual:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-manual, release]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download manual pages
        uses: actions/download-artifact@v4
        with:
          name: manual-pages
          path: manual
      - name: Add llms-full.txt
        run: cp manual/bombadil-manual.txt manual/llms-full.txt
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: manual
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
